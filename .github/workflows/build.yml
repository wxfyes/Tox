name: Build Tox Dual-Core Version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build
        run: |
          export CGO_ENABLED=0
          go build -v -trimpath -ldflags="-s -w" -o tox-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tox-${{ matrix.goarch }}
          path: tox-${{ matrix.goos }}-${{ matrix.goarch }}
