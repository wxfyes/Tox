name: Build Tox Dual-Core Version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
        include:
          - goarch: amd64
            arch_name: 64
          - goarch: arm64
            arch_name: arm64-v8a
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build
        run: |
          export CGO_ENABLED=0
          go build -v -trimpath -ldflags="-s -w" -o tox ./main.go

      - name: Prepare Package
        run: |
          mkdir -p release
          cp tox release/
          # 包含必要的资源文件
          cp geoip.dat release/ || true
          cp geosite.dat release/ || true
          cp config.json release/ || true
          cd release
          zip -r ../Tox-linux-${{ matrix.arch_name }}.zip .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tox-linux-${{ matrix.arch_name }}
          path: Tox-linux-${{ matrix.arch_name }}.zip
